###############################################################################
# pyproject.toml — единая конфигурация инструментов проекта 1c-oData-skill
###############################################################################

[project]
name = "1c-odata-skill"
version = "0.1.0"
description = "Telegram-бот для запросов к 1С через OData с AI-ассистентом"
requires-python = ">=3.12"

# ---------------------------------------------------------------------------
# Ruff — линтер + форматтер (заменяет flake8, isort, black)
# ---------------------------------------------------------------------------

[tool.ruff]
target-version = "py312"
line-length = 120

# Исключения: autogenerated / сторонний код
extend-exclude = [
    ".git",
    ".cache",
    "__pycache__",
    ".pytest_cache",
    "processing",
]

[tool.ruff.lint]
# E  — pycodestyle errors
# W  — pycodestyle warnings
# F  — pyflakes
# I  — isort
# N  — pep8-naming
# UP — pyupgrade
select = ["E", "F", "W", "I", "N", "UP"]

# Правила, которые намеренно игнорируем
ignore = [
    "E501",   # длина строки — контролируется line-length
]

[tool.ruff.lint.isort]
known-first-party = ["bot", "bot_lib", "skills"]

# ---------------------------------------------------------------------------
# Mypy — статическая проверка типов
# ---------------------------------------------------------------------------

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
show_error_codes = true
show_column_numbers = true

# Грубые папки — не проверяем
[[tool.mypy.overrides]]
module = [
    "telegram.*",
    "mcp.*",
]
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# Pytest — конфигурация тестов (перенесено из pytest.ini)
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# -v  : verbose
# --tb=short : короткие traceback
addopts = "-v --tb=short"
# Маркеры
markers = [
    "slow: медленные тесты (network, AI)",
    "integration: интеграционные тесты",
]

# ---------------------------------------------------------------------------
# Coverage — настройка покрытия
# ---------------------------------------------------------------------------

[tool.coverage.run]
source = ["bot", "bot_lib"]
omit = [
    "tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "pass",
    "raise NotImplementedError",
]
show_missing = true
fail_under = 0    # TODO: поднять порог по мере роста покрытия
